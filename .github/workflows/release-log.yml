name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: sudo snap install yq

      - name: Generate changelog
        id: changelog
        env:
          CONFIG_FILE: .github/release.yml
        run: |
          # 瑙ｆ瀽閰嶇疆鏂囦欢
          declare -A category_map
          while IFS=";" read -r title labels; do
              for label in $labels; do
                  category_map[$label]="$title"
              done
          done < <(yq -o=tsv '.categories[] | [.title, (.labels | join(" "))] | join(";")' $CONFIG_FILE)
          # 鑾峰彇鐗堟湰鑼冨洿
          mapfile -t tags < <(git tag -l --sort=-version:refname)
          current_tag=${tags[0]}
          previous_tag=${tags[1]:-}
          if [[ -z "$previous_tag" ]]; then
              commit_range="$current_tag"
              echo "棣栨鍙戝竷鐗堟湰: $current_tag"
          else
              commit_range="$previous_tag..$current_tag"
              echo "鐗堟湰鑼冨洿: $commit_range"
          fi
          # 鑾峰彇鎵€鏈夌鍚堣鑼冪殑鎻愪氦
          commits=$(git log --pretty=format:"%s|%h" "$commit_range")
          # 鐢熸垚鍒嗙被鏃ュ織
          declare -A log_entries
          while IFS="|" read -r subject hash; do
              # type=$(echo "$subject" | cut -d':' -f1 | tr -d ' ')
              type=$(echo "$subject" | sed -E 's/^([[:alnum:]]+)(\(.*\))?:.*/\1/' | tr -d ' ')
              found=0
              for label in "${!category_map[@]}"; do
                  if [[ "$type" == "$label" ]]; then
                      entry="- ${subject} (${hash:0:7})"
                      log_entries[${category_map[$label]}]+="$entry"$'\n'
                      found=1
                      break
                  fi
              done
              if [[ $found -eq 0 ]]; then
                  entry="- ${subject} (${hash:0:7})"
                  log_entries["鍏朵粬"]+="$entry"$'\n'
              fi
          done <<< "$commits"

          # 缁熻鎻愪氦鏁伴噺
          commit_count=$(git log --oneline "$commit_range" | wc -l)
          # 缁熻鍙楀奖鍝嶇殑鏂囦欢鏁伴噺
          file_count=$(git diff --name-only "$commit_range" | wc -l)
          # 缁熻璐＄尞鑰呬俊鎭?          contributor_stats=$(git shortlog -sn "$commit_range")
          contributor_notes=""
          while IFS= read -r line; do
              commits=$(echo "$line" | awk '{print $1}')
              name=$(echo "$line" | awk '{$1=""; print $0}' | sed 's/^ //')
              contributor_notes+="- @${name} (${commits} commits)\n"
          done <<< "$contributor_stats"
          # 鏋勫缓杈撳嚭鍐呭
          release_notes="## 鐗堟湰鏇存柊鏃ュ織 ($current_tag)\n\n"
          while IFS= read -r category; do
              if [[ -n "${log_entries[$category]}" ]]; then
                  release_notes+="### $category\n${log_entries[$category]}\n"
              fi
          done < <(yq '.categories[].title' $CONFIG_FILE)
          # 鏋勫缓杈撳嚭鍐呭
          release_notes="## 鐗堟湰鏇存柊鏃ュ織 ($current_tag)\n\n"
          current_date=$(date +"%Y-%m-%d")
          # 娣诲姞鍙戝竷鏃ユ湡鍜屼笅杞界粺璁′俊鎭?          release_notes+=" ### 馃搮 鍙戝竷鏃ユ湡: ${current_date}\n"
          while IFS= read -r category; do
              if [[ -n "${log_entries[$category]}" ]]; then
                  release_notes+="### $category\n${log_entries[$category]}\n"
              fi
          done < <(yq '.categories[].title' $CONFIG_FILE)

          # 娣诲姞缁熻淇℃伅
          release_notes+="### 馃搳 缁熻淇℃伅\n"
          release_notes+="- 鏈鍙戝竷鍖呭惈 ${commit_count} 涓彁浜n"
          release_notes+="- 褰卞搷 ${file_count} 涓枃浠禱n\n"
          # 娣诲姞璐＄尞鑰呬俊鎭?          release_notes+="### 馃懃 璐＄尞鑰匼n"
          release_notes+="鎰熻阿杩欎簺浼樼鐨勮础鐚€咃紙鎸夋彁浜ゆ鏁版帓搴忥級锛歕n"
          release_notes+="${contributor_notes}\n"
          release_notes+="---\n"
          # 鍐欏叆鏂囦欢
          echo -e "$release_notes" > changelog.md
          echo "鐢熸垚鏃ュ織鍐呭锛?
          cat changelog.md
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: false
          bodyFile: changelog.md
          tag: ${{ github.ref_name }}
