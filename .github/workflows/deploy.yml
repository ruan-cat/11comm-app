# -----------------------------------------------------------------------------
# VitePress 文档站点 → GitHub Pages
#
# 为什么不默认使用：
# - 仓库默认 CI（ci.yml）仅校验 H5 应用生产构建，不在 GitHub 上自动构建文档，以缩短 CI 时间、避免文档与主应用耦合失败。
# - 文档可在本地执行：pnpm run docs:dev / pnpm run docs:build
#
# 何时使用本工作流：
# - 仅在需要把 VitePress 产物发布到 GitHub Pages 时，到 Actions 中手动「Run workflow」触发（workflow_dispatch）。
# -----------------------------------------------------------------------------

name: Deploy VitePress site to Pages

on:
  # 已取消 push 自动触发；需要发布文档时请手动运行本工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，跳过正在运行和最新队列之间的运行队列
# 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出分支
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 如果未启用 lastUpdated，则不需要

      - name: 安装pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: 安装依赖（生成lockfile）
        run: pnpm install --frozen-lockfile

      - name: 安装node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: 设置github pages
        uses: actions/configure-pages@v4

      - name: 安装依赖
        run: pnpm install

      - name: 打包 vitepress 文档
        run: pnpm run docs:build

      - name: 上传文档
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: 部署到github pages
        id: deployment
        uses: actions/deploy-pages@v4
