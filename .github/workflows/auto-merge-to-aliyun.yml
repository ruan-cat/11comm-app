name: Auto Merge aliyun

on:
  push:
    branches:
      # 涓嶄娇鐢ㄨ宸ヤ綔娴佷簡 鍥犱负鎴戜滑娌℃湁 aliyun 鍒嗘敮銆備篃娌℃湁瀵瑰簲鐨?GH_TOKEN_AUTO_MERGE 浠ょ墝銆?      - main-notuse
  workflow_dispatch: # 鎵嬪姩瑙﹀彂

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN_AUTO_MERGE }}

      - name: Merge main into aliyun
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout aliyun
          git merge main --no-ff -m "Auto merge main into aliyun"
          git push origin aliyun
