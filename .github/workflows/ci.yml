name: CI

env:
  # npm 瀹樻柟闀滃儚婧愬湴鍧€锛堝彲澶嶇敤锛?  REGISTRY_URL: https://registry.npmjs.org/
  # 寮哄埗浣跨敤瀹樻柟 npm 闀滃儚婧愶紝閬垮厤娣樺疂闀滃儚婧愮増鏈粸鍚庡鑷存瀯寤哄け璐?  # NPM_CONFIG_REGISTRY 鏄?pnpm/npm 鑷姩璇嗗埆鐨勭壒娈婄幆澧冨彉閲?  # 璁剧疆鍚庝細瑕嗙洊椤圭洰 .npmrc 鏂囦欢涓殑 registry 閰嶇疆锛屾棤闇€鍦ㄥ懡浠や腑鏄惧紡鎸囧畾 --registry 鍙傛暟
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  # https://turborepo.com/docs/crafting-your-repository/constructing-ci#enabling-remote-caching
  # https://vercel.com/docs/monorepos/remote-caching#use-remote-caching-from-external-ci/cd
  # 鏆傛棤鏉冮檺鍘婚厤缃幆澧冨彉閲?鏆備笖淇濈暀鍦ㄨ繖閲?  # TURBO_TOKEN: ${{ secrets.vercel_token }}
  # TURBO_TEAM: "ruancat-projects"

on:
  push:
    branches:
      # 璁ゅ畾鍏ㄩ儴鐨勫垎鏀兘杩涜鍋ュ．鎬ф祴璇曟墦鍖?      - '*'

jobs:
  tester:
    runs-on: ubuntu-latest
    steps:
      - name: 妫€鍑哄垎鏀?        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 瀹夎pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: |
            - recursive: true
              args: [--registry, ${{ env.REGISTRY_URL }}]
            - args: [--registry, ${{ env.REGISTRY_URL }}, --global, "tsx", "turbo"]

      - name: 瀹夎node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: 妫€鏌ョ増鏈?        run: |
          node -v
          pnpm -v
          turbo --version

      - name: pnpm鍏ㄥ眬妫€鏌ヤ緷璧栧寘
        run: pnpm ls -g

      # - name: turbo login 杩滅▼鐧诲綍
      #   run: turbo login --token=${{env.TURBO_TOKEN}} --team=${{env.TURBO_TEAM}}

      # - name: turbo link 閾炬帴杩滅▼椤圭洰
      #   run: turbo link --token=${{env.TURBO_TOKEN}} --scope=${{env.TURBO_TEAM}} --yes

      - name: 瀹夎椤圭洰渚濊禆锛堜娇鐢ㄥ畼鏂规簮锛?        run: pnpm install --registry ${{ env.REGISTRY_URL }}

      # CI 浠呭仛鏋勫缓鍋ュ．鎬ц嚜妫€锛屼笉鎵挎媴浠讳綍 Vercel 閮ㄧ讲鑱岃矗锛涘綋鍓嶈鐩?H5 鐢熶骇鏋勫缓 + Nitro Vercel 鏋勫缓
      - name: turbo 骞跺彂鎵撳寘锛圚5 + Nitro Vercel 鏋勫缓锛?        run: pnpm run ci
