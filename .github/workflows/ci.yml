name: CI

# env:
# https://turborepo.com/docs/crafting-your-repository/constructing-ci#enabling-remote-caching
# https://vercel.com/docs/monorepos/remote-caching#use-remote-caching-from-external-ci/cd
# 暂无权限去配置环境变量 暂且保留在这里
# TURBO_TOKEN: ${{ secrets.vercel_token }}
# TURBO_TEAM: "ruancat-projects"

on:
  push:
    branches:
      # 认定全部的分支都进行健壮性测试打包
      - '*'

jobs:
  tester:
    runs-on: ubuntu-latest
    env:
      # 强制使用官方 npm 镜像源，避免淘宝镜像源版本滞后导致构建失败
      # 必须在 job 级别设置，确保从 pnpm/action-setup 和 setup-node 阶段就开始使用官方源
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    steps:
      - name: 检出分支
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: |
            - recursive: true
              args: [--registry, https://registry.npmjs.org]
            - args: [--registry, https://registry.npmjs.org, --global, "tsx", "turbo"]

      - name: 安装node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: 检查版本
        run: |
          node -v
          pnpm -v
          turbo --version

      - name: pnpm全局检查依赖包
        run: pnpm ls -g

      # - name: turbo login 远程登录
      #   run: turbo login --token=${{env.TURBO_TOKEN}} --team=${{env.TURBO_TEAM}}

      # - name: turbo link 链接远程项目
      #   run: turbo link --token=${{env.TURBO_TOKEN}} --scope=${{env.TURBO_TEAM}} --yes

      - name: 安装项目依赖（使用官方源）
        run: pnpm install --registry https://registry.npmjs.org/

      - name: turbo并发打包全部子项目
        run: pnpm run ci
