name: CI

env:
  # npm 官方镜像源地址（可复用）
  REGISTRY_URL: https://registry.npmjs.org/
  # 强制使用官方 npm 镜像源，避免淘宝镜像源版本滞后导致构建失败
  # NPM_CONFIG_REGISTRY 是 pnpm/npm 自动识别的特殊环境变量
  # 设置后会覆盖项目 .npmrc 文件中的 registry 配置，无需在命令中显式指定 --registry 参数
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  # https://turborepo.com/docs/crafting-your-repository/constructing-ci#enabling-remote-caching
  # https://vercel.com/docs/monorepos/remote-caching#use-remote-caching-from-external-ci/cd
  # 暂无权限去配置环境变量 暂且保留在这里
  # TURBO_TOKEN: ${{ secrets.vercel_token }}
  # TURBO_TEAM: "ruancat-projects"

on:
  push:
    branches:
      # 认定全部的分支都进行健壮性测试打包
      - '*'

jobs:
  tester:
    runs-on: ubuntu-latest
    steps:
      - name: 检出分支
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: |
            - recursive: true
              args: [--registry, ${{ env.REGISTRY_URL }}]
            - args: [--registry, ${{ env.REGISTRY_URL }}, --global, "tsx", "turbo"]

      - name: 安装node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: 检查版本
        run: |
          node -v
          pnpm -v
          turbo --version

      - name: pnpm全局检查依赖包
        run: pnpm ls -g

      # - name: turbo login 远程登录
      #   run: turbo login --token=${{env.TURBO_TOKEN}} --team=${{env.TURBO_TEAM}}

      # - name: turbo link 链接远程项目
      #   run: turbo link --token=${{env.TURBO_TOKEN}} --scope=${{env.TURBO_TEAM}} --yes

      - name: 安装项目依赖（使用官方源）
        run: pnpm install --registry ${{ env.REGISTRY_URL }}

      # CI 仅做构建健壮性自检，不承担任何 Vercel 部署职责；当前覆盖 H5 生产构建 + Nitro Vercel 构建
      - name: turbo 并发打包（H5 + Nitro Vercel 构建）
        run: pnpm run ci
